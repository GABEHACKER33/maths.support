<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found :(</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }

        .container {
            text-align: center;
            padding: 40px;
        }

        .error-code {
            font-size: 120px;
            font-weight: 700;
            color: #e0e0e0;
            line-height: 1;
            letter-spacing: -5px;
        }

        .error-title {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 12px;
            color: #222;
        }

        .error-message {
            font-size: 15px;
            color: #888;
            margin-bottom: 32px;
            line-height: 1.6;
        }

        .home-btn {
            display: inline-block;
            padding: 12px 28px;
            background-color: #333;
            color: #fff;
            text-decoration: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            transition: background-color 0.2s ease;
        }

        .home-btn:hover {
            background-color: #555;
        }

        .divider {
            width: 40px;
            height: 3px;
            background-color: #333;
            margin: 16px auto 20px;
            border-radius: 2px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="error-code">404</div>
        <div class="divider"></div>
        <h1 class="error-title">Page Not Found</h1>
        <p class="error-message">
            The page you're looking for doesn't exist<br>or has been moved.
        </p>
        <a href="/" class="home-btn">Go Back Home</a>
    </div>

</body>
</html>
